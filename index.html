<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HCCS Navigation System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* ===== LOGIN SCREEN ===== */
#authScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#authBox {
  background: white;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
  width: 300px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

#authBox img {
  width: 120px;
  margin-bottom: 20px;
}

#authBox input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

#authBox button {
  width: 100%;
  padding: 8px;
  margin-bottom: 5px;
}

/* ===== LOGOUT BUTTON ===== */
#logoutBtn {
  position: absolute;
  top: 10px;
  right: 240px;
  z-index: 10;
}

/* ===== ORIGINAL STYLES ===== */

#mapCanvas {
  display: block;
  background: #eee;
  cursor: grab;
}

#floorSelector {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  z-index: 10;
}

#rightMenu {
  position: absolute;
  right: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #ffffff;
  overflow-y: auto;
  padding: 10px;
  border-left: 2px solid #ccc;
  z-index: 10;
}

#rightMenu button {
  width: 100%;
  margin-bottom: 5px;
}

#zoomControls {
  position: absolute;
  bottom: 20px;
  right: 240px;
  z-index: 10;
}

.dark {
  background: #111;
  color: white;
}

.dark #rightMenu {
  background: #222;
  color: white;
}
</style>
</head>

<body>

<!-- LOGIN / REGISTER SCREEN -->
<div id="authScreen">
  <div id="authBox">
    <img src="images/logo.jpeg" alt="School Logo">
    <h3>HCCS Map Login</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- LOGOUT BUTTON -->
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<div id="floorSelector">
  <button onclick="changeFloor(1)">Finance Office</button>
  <button onclick="changeFloor(2)">CTB Grounds</button>
  <button onclick="changeFloor(3)">Guidance</button>
  <button onclick="changeFloor(4)">Chapel</button>
</div>

<div id="rightMenu"></div>

<canvas id="mapCanvas"></canvas>

<div id="zoomControls">
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">−</button>
</div>

<button style="position:absolute;bottom:20px;left:20px;z-index:10;" onclick="toggleDarkMode()">🌙</button>

<script>
/* ===== SIMPLE LOGIN SYSTEM ===== */
function register(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(!user || !pass){
    alert("Please fill all fields.");
    return;
  }

  localStorage.setItem("user_"+user, pass);
  alert("Registered successfully!");
}

function login(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const storedPass = localStorage.getItem("user_"+user);

  if(storedPass === pass){
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("logoutBtn").style.display = "block";
  } else {
    alert("Invalid credentials.");
  }
}

function logout(){
  document.getElementById("authScreen").style.display = "flex";
  document.getElementById("logoutBtn").style.display = "none";

  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}

/* ===== ORIGINAL MAP CODE (UNCHANGED) ===== */

const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let startX, startY;

let currentFloor = 1;
let startLocation = null;
let destinationLocation = null;

const floorImages = {
  1: "images/Finance Office.jpg",
  2: "images/CTB Grounds.jpg",
  3: "images/Guidance.jpg",
  4: "images/Chapel.jpg"
};

let currentImage = new Image();
currentImage.src = floorImages[currentFloor];

const locations = [
  { name: "Finance Office", x: 380, y: 270, floor: 1 },
  { name: "Registrar", x: 1050, y: 400, floor: 1 },
  { name: "Grade School \nPrincipal's Office", x: 1050, y: 170, floor: 1 },
  { name: "Admin Office", x: 1200, y: 400, floor: 1 },
  { name: "High School \nPrincipal's Office", x: 1400, y: 570, floor: 1 },
  { name: "Library", x: 450, y: 200, floor: 2 },
  { name: "CTB 508", x: 350, y: 235, floor: 2 }
];

const stairs = {
  1: { x: 500, y: 300 },
  2: { x: 520, y: 280 },
  3: { x: 540, y: 260 }
};

function drawMap() {
  ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
  ctx.clearRect(-offsetX/scale, -offsetY/scale, canvas.width/scale, canvas.height/scale);

  ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);

  locations.forEach(loc => {
    if(loc.floor === currentFloor){
      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(loc.x, loc.y, 6, 0, Math.PI*2);
      ctx.fill();
    }
  });

  if(startLocation) highlight(startLocation,"blue");
  if(destinationLocation) highlight(destinationLocation,"green");
}

function changeFloor(floor){
  currentFloor = floor;
  currentImage.src = floorImages[floor];
  currentImage.onload = drawMap;
}

function highlight(loc, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(loc.x, loc.y, 10, 0, Math.PI*2);
  ctx.fill();
}

function drawPath(start, end){
  let progress = 0;

  function animate(){
    if(progress <= 1){
      drawMap();

      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(
        start.x + (end.x - start.x) * progress,
        start.y + (end.y - start.y) * progress
      );
      ctx.strokeStyle = "red";
      ctx.lineWidth = 4;
      ctx.stroke();

      progress += 0.02;
      requestAnimationFrame(animate);
    }
  }

  animate();
}

function navigate(start, destination){
  if(start.floor !== destination.floor){
    drawPath(start, stairs[start.floor]);
    setTimeout(()=>{
      changeFloor(destination.floor);
      drawPath(stairs[destination.floor], destination);
    },1500);
  } else {
    drawPath(start, destination);
  }
}

function zoomIn(){ scale += 0.1; drawMap(); }
function zoomOut(){ scale -= 0.1; drawMap(); }

function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

function loadMenu(){
  const menu = document.getElementById("rightMenu");

  locations.forEach(loc=>{
    const btn = document.createElement("button");
    btn.innerText = loc.name;

    btn.onclick = ()=>{
      if(!startLocation){
        alert("Click the map to set your starting point first.");
        return;
      }

      destinationLocation = loc;
      changeFloor(loc.floor);
      navigate(startLocation,destinationLocation);
    };

    menu.appendChild(btn);
  });
}

canvas.addEventListener("mousedown", (e)=>{
  isDragging = true;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
  canvas.style.cursor = "grabbing";
});

canvas.addEventListener("mousemove", (e)=>{
  if(isDragging){
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    drawMap();
  }
});

canvas.addEventListener("mouseup", ()=>{
  isDragging = false;
  canvas.style.cursor = "grab";
});

canvas.addEventListener("click", (e)=>{
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left - offsetX) / scale;
  const y = (e.clientY - rect.top - offsetY) / scale;

  startLocation = { x: x, y: y, floor: currentFloor };
  destinationLocation = null;
  drawMap();
});

currentImage.onload = drawMap;
loadMenu();
</script>

</body>
</html>
