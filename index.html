<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HCCS Navigation System</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
}

/* LOGIN */

#authScreen{
position:fixed;
width:100%;
height:100%;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#authBox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#authBox img{
width:120px;
margin-bottom:20px;
}

#authBox input{
width:100%;
padding:8px;
margin-bottom:10px;
}

#authBox button{
width:100%;
padding:8px;
margin-bottom:5px;
}

/* MAP */

#logoutBtn{
position:absolute;
top:10px;
right:240px;
z-index:10;
}

#mapCanvas{
display:block;
background:#eee;
cursor:grab;
}

#floorSelector{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
z-index:10;
}

#rightMenu{
position:absolute;
right:0;
top:0;
width:220px;
height:100%;
background:white;
overflow-y:auto;
padding:10px;
border-left:2px solid #ccc;
z-index:10;
}

#rightMenu button{
width:100%;
margin-bottom:5px;
}

#zoomControls{
position:absolute;
bottom:20px;
right:240px;
z-index:10;
}

.dark{
background:#111;
color:white;
}

.dark #rightMenu{
background:#222;
}

</style>
</head>

<body>

<div id="tutorialOverlay" style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    color:white;
    display:none;
    z-index:1000;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
">
    <div id="tutorialContent" style="max-width:600px;">
        <h2>Welcome to HCCS Map!</h2>
        <p id="tutorialText"></p>
        <button id="tutorialNextBtn" style="padding:10px 20px;margin-top:20px;">Next</button>
        <button id="tutorialCloseBtn" style="padding:10px 20px;margin-top:20px;">Skip Tutorial</button>
    </div>
</div>

<div id="authScreen">
<div id="authBox">
<img src="logo.jpeg">
<h3>HCCS Map Login</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<div id="floorSelector">
<button onclick="changeFloor(1)">Ground Floor</button>
</div>

<div id="rightMenu"></div>
<div id="tooltip" style="
position:absolute;
background:black;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:4px;
pointer-events:none;
display:none;
z-index:20;
"></div>
<canvas id="mapCanvas"></canvas>

<div id="zoomControls">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
</div>

<button style="position:absolute;bottom:20px;left:20px;z-index:10;" onclick="toggleDarkMode()">🌙</button>
<button id="wallBtn" style="display:none;position:absolute;bottom:60px;left:20px;z-index:10;" onclick="toggleWallMode()">Show Detected Walls</button>
<button id="addWallBtn" style="display:none;position:absolute;bottom:100px;left:20px;z-index:10;" onclick="toggleManualWalls()">Add Walls</button>
<button id="clearWallBtn" style="display:none;position:absolute;bottom:140px;left:20px;z-index:10;" onclick="clearSavedWalls()">Clear Saved Walls</button>
<button id="exportWallBtn" onclick="exportWalls()" style="display:none;position:absolute;bottom:180px;left:20px;z-index:10;">Export Walls</button>


<div id="highlightBox" style="
    position:absolute;
    border:3px solid yellow;
    border-radius:8px;
    pointer-events:none;
    display:none;
    z-index:1010;
"></div>

<script>

/* LOGIN */

function register(){
const user=username.value;
const pass=password.value;

if(!user||!pass){
alert("Fill all fields");
return;
}

localStorage.setItem("user_"+user,pass);
alert("Registered");
}

function login(){
    const user = username.value;
    const pass = password.value;
    const stored = localStorage.getItem("user_"+user);

    if(stored === pass){
        authScreen.style.display = "none";
        logoutBtn.style.display = "block";

        // --- show tutorial after login ---
        showTutorial();

    } else {
        alert("Invalid login");
    }
}



let tutorialIndex = 0;

function showTutorial() {
    const overlay = document.getElementById("tutorialOverlay");
    const text = document.getElementById("tutorialText");
    const highlight = document.getElementById("highlightBox");

    overlay.style.display = "flex";

    const step = tutorialSteps[tutorialIndex];
text.innerText = step.text;

if(step.target){
    const el = document.querySelector(step.target);
    if(el){
        const rect = el.getBoundingClientRect();
        highlight.style.display = "block";
        highlight.style.top = (rect.top + window.scrollY - 5) + "px";
        highlight.style.left = (rect.left + window.scrollX - 5) + "px";
        highlight.style.width = (rect.width + 10) + "px";
        highlight.style.height = (rect.height + 10) + "px";
    }
} else {
    highlight.style.display = "none";
}

document.getElementById("tutorialNextBtn").addEventListener("click", () => {
    tutorialIndex++;
    if (tutorialIndex >= tutorialSteps.length) {
        document.getElementById("tutorialOverlay").style.display = "none";
        document.getElementById("highlightBox").style.display = "none";
    } else {
        showTutorial();
    }
});

document.getElementById("tutorialCloseBtn").addEventListener("click", () => {
    document.getElementById("tutorialOverlay").style.display = "none";
    document.getElementById("highlightBox").style.display = "none";
});
}
function logout(){
authScreen.style.display="flex";
logoutBtn.style.display="none";
}

/* MAP */

const canvas=document.getElementById("mapCanvas");
const ctx=canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let scale=1;
let offsetX=0;
let offsetY=0;

let isDragging=false;
let startX,startY;

let currentFloor=1;

let startLocation=null;
let destinationLocation=null;

const floorImages={
1:"Ground Floor.png"
};

let currentImage=new Image();
currentImage.src=floorImages[currentFloor];

/* GRID */

const gridSize=5;

let wallGrid=[];
let gridWidth;
let gridHeight;
let drawWallMode=false;
let manualWallMode=false;

function toggleWallMode(){
drawWallMode=!drawWallMode;
drawMap();
}

function toggleManualWalls(){
manualWallMode=!manualWallMode;
alert(manualWallMode ? "Manual wall mode ON" : "Manual wall mode OFF");
}

/* WALL DETECTION */

function detectWallsFromImage(){

const tempCanvas=document.createElement("canvas");
const tempCtx=tempCanvas.getContext("2d");

tempCanvas.width=currentImage.width;
tempCanvas.height=currentImage.height;

tempCtx.drawImage(currentImage,0,0);

const data=tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height).data;

gridWidth=Math.ceil(tempCanvas.width/gridSize);
gridHeight=Math.ceil(tempCanvas.height/gridSize);

wallGrid=new Array(gridWidth);

for(let x=0;x<gridWidth;x++){
wallGrid[x]=new Array(gridHeight).fill(false);
}

for(let y=0;y<tempCanvas.height;y+=gridSize){
for(let x=0;x<tempCanvas.width;x+=gridSize){

const i=((y*tempCanvas.width)+x)*4;

const r=data[i];
const g=data[i+1];
const b=data[i+2];

const brightness=(r+g+b)/3;

/* IGNORE GREEN AREAS */
const isGreen = g > 120 && g > r + 40 && g > b + 40;

/* DETECT DARK WALL LINES */
const darkLine = brightness < 130;

/* DETECT PURPLE WALL OUTLINES */
const purpleWall = r > 120 && b > 120 && g < 120;

/* DETECT BLUE WALL OUTLINES */
const blueWall = b > 140 && r < 120;

/* DETECT RED PILLARS */
const redPillar = r > 140 && g < 90 && b < 90;

if((darkLine || purpleWall || blueWall || redPillar) && !isGreen){

const gx=Math.floor(x/gridSize);
const gy=Math.floor(y/gridSize);

wallGrid[gx][gy]=true;

}

}
}

/* LOAD SAVED WALLS AFTER DETECTION */
loadWalls();
loadWallsFromFile();

}

/* LOCATIONS */

const locations=[
{name:"Finance Office",x:910,y:3300,floor:1},
{name:"Registrar",x:1400,y:3300,floor:1},
{name:"Grade School Principal's Office",x:1400,y:3150,floor:1},
{name:"Admin Office",x:1650,y:3400,floor:1},
{name:"Cafeteria",x:1200,y:1000,floor:1},
{name:"CTB Elevator 1",x:1885,y:2780,floor:1},
{name:"Medical Room",x:1850,y:2700,floor:1},
{name:"Medical Office",x:2280,y:2075,floor:1},
{name:"Fire Exit 1",x:2280,y:2010,floor:1},
{name:"SBMO",x:2280,y:2600,floor:1},
{name:"CCFO",x:2280,y:2370,floor:1},
{name:"CTB Elevator 2",x:2000,y:2780,floor:1},
{name:"High School Principal's Office",x:1950,y:3420,floor:1},
{name:"Guidance Office",x:2935,y:3420,floor:1},
{name:"Mother Theresa's Chapel",x:2850,y:2450,floor:1},
{name:"HRMD Office",x:2850,y:1720,floor:1},
{name:"Model House",x:2850,y:1400,floor:1},
{name:"Conference Office",x:3110,y:3420,floor:1},
{name:"Female CR",x:2510,y:3310,floor:1},
{name:"Male CR",x:2630,y:3310,floor:1}
];

/* DRAW MAP */

function drawMap(){

ctx.setTransform(scale,0,0,scale,offsetX,offsetY);

ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width/scale,canvas.height/scale);

ctx.drawImage(currentImage,0,0,currentImage.width,currentImage.height);

if(drawWallMode){
for(let x=0;x<gridWidth;x++){
for(let y=0;y<gridHeight;y++){
if(wallGrid[x][y]){
ctx.fillStyle="rgba(255,0,0,0.4)";
ctx.fillRect(x*gridSize,y*gridSize,gridSize,gridSize);
}
}
}
}

locations.forEach(loc=>{
if(loc.floor===currentFloor){
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(loc.x,loc.y,6,0,Math.PI*2);
ctx.fill();
}
});

if(startLocation) highlight(startLocation,"blue");
if(destinationLocation) highlight(destinationLocation,"green");

}

function isWall(x,y){

if(x<0||y<0||x>=gridWidth||y>=gridHeight) return true;

const buffer = 3; // distance from wall

for(let dx=-buffer; dx<=buffer; dx++){
for(let dy=-buffer; dy<=buffer; dy++){

const nx = x + dx;
const ny = y + dy;

if(nx>=0 && ny>=0 && nx<gridWidth && ny<gridHeight){
if(wallGrid[nx][ny]) return true;
}

}
}

return false;
}

/* PATHFIND */
/* unchanged */

function drawPath(start,end){

const startNode={x:Math.floor(start.x/gridSize),y:Math.floor(start.y/gridSize)};
const endNode={x:Math.floor(end.x/gridSize),y:Math.floor(end.y/gridSize)};

function key(n){return n.x+","+n.y;}
function heuristic(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);}

let open=[startNode];
let cameFrom={};

let gScore={};
gScore[key(startNode)]=0;

let fScore={};
fScore[key(startNode)]=heuristic(startNode,endNode);

let visited=new Set();

function step(){

let iterations=0;

while(open.length && iterations<2000){

open.sort((a,b)=>fScore[key(a)]-fScore[key(b)]);
let current=open.shift();

if(current.x===endNode.x && current.y===endNode.y){

let path=[];
let c=key(current);

while(c){
const [px,py]=c.split(",").map(Number);
path.push({x:px,y:py});
c=cameFrom[c];
}

path.reverse();
animatePath(path);
return;
}

visited.add(key(current));

const neighbors=[
{x:current.x+1,y:current.y},
{x:current.x-1,y:current.y},
{x:current.x,y:current.y+1},
{x:current.x,y:current.y-1}
];

for(const n of neighbors){

const nk=key(n);

if(visited.has(nk)) continue;
if(isWall(n.x,n.y)) continue;

const tentative=gScore[key(current)]+1;

if(gScore[nk]===undefined || tentative<gScore[nk]){

cameFrom[nk]=key(current);
gScore[nk]=tentative;
fScore[nk]=tentative+heuristic(n,endNode);

if(!open.some(o=>o.x===n.x&&o.y===n.y)){
open.push(n);
}

}

}

iterations++;
}

if(open.length){
requestAnimationFrame(step);
}

}

step();
}

/* PATH ANIMATION */

function animatePath(path){

let progress=0;

function animate(){

if(progress>=path.length) return;

drawMap();

ctx.strokeStyle="red";
ctx.lineWidth=4;
ctx.beginPath();

for(let i=0;i<=progress;i++){

const px=path[i].x*gridSize+gridSize/2;
const py=path[i].y*gridSize+gridSize/2;

if(i===0) ctx.moveTo(px,py);
else ctx.lineTo(px,py);

}

ctx.stroke();

progress++;

requestAnimationFrame(animate);

}

animate();
}

/* NAVIGATION */

function navigate(start,destination){
drawPath(start,destination);
}

function highlight(loc,color){
ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(loc.x,loc.y,10,0,Math.PI*2);
ctx.fill();
}

/* FLOOR */

function changeFloor(floor){

currentFloor=floor;
currentImage.src=floorImages[floor];

currentImage.onload=()=>{

detectWallsFromImage();
drawMap();

};

}

/* ZOOM */

function zoomIn(){scale+=0.1;drawMap();}
function zoomOut(){scale-=0.1;drawMap();}

/* DARK MODE */

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

/* MENU */

function loadMenu(){

const menu=document.getElementById("rightMenu");

locations.forEach(loc=>{

const btn=document.createElement("button");
btn.innerText=loc.name;

btn.onclick=()=>{

if(!startLocation){
alert("Click map to set start first");
return;
}

destinationLocation=loc;

changeFloor(loc.floor);

navigate(startLocation,destinationLocation);

};

menu.appendChild(btn);

});

}

/* DRAG (MIDDLE MOUSE ONLY) */

canvas.addEventListener("mousedown",e=>{
if(e.button!==1) return;
isDragging=true;
startX=e.clientX-offsetX;
startY=e.clientY-offsetY;
});

canvas.addEventListener("mousemove",e=>{
if(!isDragging) return;
offsetX=e.clientX-startX;
offsetY=e.clientY-startY;
drawMap();
});

canvas.addEventListener("mouseup",e=>{
if(e.button===1) isDragging=false;
});

/* SAVE / LOAD WALLS */

function saveWalls(){

const saveData=[];

for(let x=0;x<gridWidth;x++){
for(let y=0;y<gridHeight;y++){
if(wallGrid[x][y]){
saveData.push([x,y]);
}
}
}

localStorage.setItem("manualWalls",JSON.stringify(saveData));
}

function loadWalls(){

const data=localStorage.getItem("manualWalls");
if(!data) return;

const walls=JSON.parse(data);

walls.forEach(w=>{
const x=w[0];
const y=w[1];
if(x<gridWidth && y<gridHeight){
wallGrid[x][y]=true;
}
});

}

/* CLICK */

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect();

const x=(e.clientX-rect.left-offsetX)/scale;
const y=(e.clientY-rect.top-offsetY)/scale;

const gx=Math.floor(x/gridSize);
const gy=Math.floor(y/gridSize);

if(manualWallMode){

if(gx>=0 && gy>=0 && gx<gridWidth && gy<gridHeight){
wallGrid[gx][gy]=true;
saveWalls();
}

drawMap();
return;

}

startLocation={x:x,y:y,floor:currentFloor};
destinationLocation=null;

drawMap();

});

/* START */

currentImage.onload=()=>{
detectWallsFromImage();
drawMap();
};

loadMenu();

function clearSavedWalls(){
localStorage.removeItem("manualWalls");
alert("Saved walls cleared");
location.reload();
}

let adminMode=false;

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.shiftKey && e.key==="A"){

adminMode=!adminMode;

const state=adminMode ? "block" : "none";

document.getElementById("wallBtn").style.display=state;
document.getElementById("addWallBtn").style.display=state;
document.getElementById("clearWallBtn").style.display=state;
document.getElementById("exportWallBtn").style.display=state;

alert(adminMode ? "Admin Mode Enabled" : "Admin Mode Disabled");

}

});

function loadWallsFromFile(){

fetch("walls.json")
.then(res=>{
if(!res.ok) return null;
return res.json();
})
.then(data=>{

if(!data) return;

data.forEach(w=>{

const x=w[0];
const y=w[1];

if(x<gridWidth && y<gridHeight){
wallGrid[x][y]=true;
}

});

drawMap();

})
.catch(()=>{});

}

canvas.addEventListener("mousemove",e=>{

if(isDragging) return;

const rect=canvas.getBoundingClientRect();

const x=(e.clientX-rect.left-offsetX)/scale;
const y=(e.clientY-rect.top-offsetY)/scale;

let found=false;

locations.forEach(loc=>{

if(loc.floor!==currentFloor) return;

const dx=x-loc.x;
const dy=y-loc.y;
const dist=Math.sqrt(dx*dx+dy*dy);

if(dist<10){

tooltip.style.display="block";
tooltip.style.left=e.clientX+10+"px";
tooltip.style.top=e.clientY+10+"px";
tooltip.innerText=loc.name;

found=true;

}

});

if(!found){
tooltip.style.display="none";
}

});

function exportWalls(){

const saveData=[];

for(let x=0;x<gridWidth;x++){
for(let y=0;y<gridHeight;y++){
if(wallGrid[x][y]){
saveData.push([x,y]);
}
}
}

const blob=new Blob([JSON.stringify(saveData)],{type:"application/json"});

const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="walls.json";
a.click();

}



const tutorialSteps = [
    { text: "Click anywhere on the map to set your starting location.", target: "#mapCanvas" },
    { text: "Click a location on the right menu to set your destination.", target: "#rightMenu" },
    { text: "Use the + / − buttons to zoom in and out.", target: "#zoomControls" },
    { text: "Admin users can add or remove walls using Ctrl+Shift+A to enable admin mode.", target: "#wallBtn" },
    { text: "Hover over dots to see their names.", target: null }, // no highlight
    { text: "Click 'Skip Tutorial' anytime to close this tutorial.", target: "#tutorialCloseBtn" }
];

</script>

</body>
</html>
