<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HCCS Navigation System</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
}

/* LOGIN */

#authScreen{
position:fixed;
width:100%;
height:100%;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#authBox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#authBox img{
width:120px;
margin-bottom:20px;
}

#authBox input{
width:100%;
padding:8px;
margin-bottom:10px;
}

#authBox button{
width:100%;
padding:8px;
margin-bottom:5px;
}

/* MAP */

#logoutBtn{
position:absolute;
top:10px;
right:240px;
z-index:10;
}

#mapCanvas{
display:block;
background:#eee;
cursor:grab;
}

#floorSelector{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
z-index:10;
}

#rightMenu{
position:absolute;
right:0;
top:0;
width:220px;
height:100%;
background:white;
overflow-y:auto;
padding:10px;
border-left:2px solid #ccc;
z-index:10;
}

#rightMenu button{
width:100%;
margin-bottom:5px;
}

#zoomControls{
position:absolute;
bottom:20px;
right:240px;
z-index:10;
}

.dark{
background:#111;
color:white;
}

.dark #rightMenu{
background:#222;
}

</style>
</head>

<body>

<div id="authScreen">
<div id="authBox">
<img src="logo.jpeg">
<h3>HCCS Map Login</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<div id="floorSelector">
<button onclick="changeFloor(1)">Ground Floor</button>
</div>

<div id="rightMenu"></div>

<canvas id="mapCanvas"></canvas>

<div id="zoomControls">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
</div>

<button style="position:absolute;bottom:20px;left:20px;z-index:10;" onclick="toggleDarkMode()">🌙</button>
<button style="position:absolute;bottom:60px;left:20px;z-index:10;" onclick="toggleWallMode()">Show Detected Walls</button>
<button style="position:absolute;bottom:100px;left:20px;z-index:10;" onclick="toggleManualWalls()">Add Walls</button>

<script>

/* LOGIN */

function register(){
const user=username.value;
const pass=password.value;

if(!user||!pass){
alert("Fill all fields");
return;
}

localStorage.setItem("user_"+user,pass);
alert("Registered");
}

function login(){
const user=username.value;
const pass=password.value;
const stored=localStorage.getItem("user_"+user);

if(stored===pass){
authScreen.style.display="none";
logoutBtn.style.display="block";
}else{
alert("Invalid login");
}
}

function logout(){
authScreen.style.display="flex";
logoutBtn.style.display="none";
}

/* MAP */

const canvas=document.getElementById("mapCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let scale=1;
let offsetX=0;
let offsetY=0;

let isDragging=false;
let startX,startY;

let currentFloor=1;

let startLocation=null;
let destinationLocation=null;

const floorImages={
1:"Ground Floor.png"
};

let currentImage=new Image();
currentImage.src=floorImages[currentFloor];

/* GRID */

const gridSize=6;

let wallGrid=[];
let gridWidth;
let gridHeight;
let drawWallMode=false;
let manualWallMode=false;

function toggleWallMode(){
drawWallMode=!drawWallMode;
drawMap();
}

function toggleManualWalls(){
manualWallMode=!manualWallMode;
alert(manualWallMode ? "Manual wall mode ON" : "Manual wall mode OFF");
}

/* WALL DETECTION */

function detectWallsFromImage(){

const tempCanvas=document.createElement("canvas");
const tempCtx=tempCanvas.getContext("2d");

tempCanvas.width=currentImage.width;
tempCanvas.height=currentImage.height;

tempCtx.drawImage(currentImage,0,0);

const data=tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height).data;

gridWidth=Math.ceil(tempCanvas.width/gridSize);
gridHeight=Math.ceil(tempCanvas.height/gridSize);

wallGrid=new Array(gridWidth);

for(let x=0;x<gridWidth;x++){
wallGrid[x]=new Array(gridHeight).fill(false);
}

for(let y=0;y<tempCanvas.height;y+=gridSize){
for(let x=0;x<tempCanvas.width;x+=gridSize){

const i=((y*tempCanvas.width)+x)*4;

const r=data[i];
const g=data[i+1];
const b=data[i+2];

const brightness=(r+g+b)/3;

const max=Math.max(r,g,b);
const min=Math.min(r,g,b);
const colorDiff=max-min;

const isGray=colorDiff<30;

const darkWall=brightness<160 && isGray;
const lightWall=brightness>160 && brightness<220 && isGray;
const redPillar=r>140 && g<90 && b<90;

const isCyan=g>150 && b>150 && r<120;
const isGreen=g>r+50 && g>b+50;
const isBlue=b>r+50 && b>g+50;

if((darkWall||lightWall||redPillar) && !isCyan && !isGreen && !isBlue){

const gx=Math.floor(x/gridSize);
const gy=Math.floor(y/gridSize);

wallGrid[gx][gy]=true;

}

}
}

/* LOAD SAVED WALLS AFTER DETECTION */
loadWalls();

}

/* LOCATIONS */

const locations=[
{name:"Finance Office",x:910,y:3300,floor:1},
{name:"Registrar",x:1400,y:3300,floor:1},
{name:"Grade School Principal's Office",x:1400,y:3150,floor:1},
{name:"Admin Office",x:1650,y:3400,floor:1},
{name:"Cafeteria",x:1200,y:1000,floor:1},
{name:"CTB Elevator 1",x:1885,y:2780,floor:1},
{name:"Medical Room",x:1850,y:2700,floor:1},
{name:"Medical Office",x:2280,y:2075,floor:1},
{name:"Fire Exit 1",x:2280,y:2010,floor:1},
{name:"SBMO",x:2280,y:2600,floor:1},
{name:"CCFO",x:2280,y:2370,floor:1},
{name:"CTB Elevator 2",x:2000,y:2780,floor:1},
{name:"High School Principal's Office",x:1950,y:3420,floor:1},
{name:"Guidance Office",x:2930,y:3420,floor:1},
{name:"Mother Theresa's Chapel",x:2850,y:2450,floor:1},
{name:"HRMD Office",x:2850,y:1720,floor:1},
{name:"Model House",x:2850,y:1400,floor:1},
{name:"Conference Office",x:3110,y:3420,floor:1},
{name:"Female CR",x:2510,y:3310,floor:1},
{name:"Male CR",x:2630,y:3310,floor:1}
];

/* DRAW MAP */

function drawMap(){

ctx.setTransform(scale,0,0,scale,offsetX,offsetY);

ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width/scale,canvas.height/scale);

ctx.drawImage(currentImage,0,0,currentImage.width,currentImage.height);

if(drawWallMode){
for(let x=0;x<gridWidth;x++){
for(let y=0;y<gridHeight;y++){
if(wallGrid[x][y]){
ctx.fillStyle="rgba(255,0,0,0.4)";
ctx.fillRect(x*gridSize,y*gridSize,gridSize,gridSize);
}
}
}
}

locations.forEach(loc=>{
if(loc.floor===currentFloor){
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(loc.x,loc.y,6,0,Math.PI*2);
ctx.fill();
}
});

if(startLocation) highlight(startLocation,"blue");
if(destinationLocation) highlight(destinationLocation,"green");

}

function isWall(x,y){
if(x<0||y<0||x>=gridWidth||y>=gridHeight) return true;
return wallGrid[x][y];
}

/* PATHFIND */
/* unchanged */

function drawPath(start,end){

const startNode={x:Math.floor(start.x/gridSize),y:Math.floor(start.y/gridSize)};
const endNode={x:Math.floor(end.x/gridSize),y:Math.floor(end.y/gridSize)};

function key(n){return n.x+","+n.y;}
function heuristic(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);}

let open=[startNode];
let cameFrom={};

let gScore={};
gScore[key(startNode)]=0;

let fScore={};
fScore[key(startNode)]=heuristic(startNode,endNode);

let visited=new Set();

function step(){

let iterations=0;

while(open.length && iterations<2000){

open.sort((a,b)=>fScore[key(a)]-fScore[key(b)]);
let current=open.shift();

if(current.x===endNode.x && current.y===endNode.y){

let path=[];
let c=key(current);

while(c){
const [px,py]=c.split(",").map(Number);
path.push({x:px,y:py});
c=cameFrom[c];
}

path.reverse();
animatePath(path);
return;
}

visited.add(key(current));

const neighbors=[
{x:current.x+1,y:current.y},
{x:current.x-1,y:current.y},
{x:current.x,y:current.y+1},
{x:current.x,y:current.y-1}
];

for(const n of neighbors){

const nk=key(n);

if(visited.has(nk)) continue;
if(isWall(n.x,n.y)) continue;

const tentative=gScore[key(current)]+1;

if(gScore[nk]===undefined || tentative<gScore[nk]){

cameFrom[nk]=key(current);
gScore[nk]=tentative;
fScore[nk]=tentative+heuristic(n,endNode);

if(!open.some(o=>o.x===n.x&&o.y===n.y)){
open.push(n);
}

}

}

iterations++;
}

if(open.length){
requestAnimationFrame(step);
}

}

step();
}

/* PATH ANIMATION */

function animatePath(path){

let progress=0;

function animate(){

if(progress>=path.length) return;

drawMap();

ctx.strokeStyle="red";
ctx.lineWidth=4;
ctx.beginPath();

for(let i=0;i<=progress;i++){

const px=path[i].x*gridSize+gridSize/2;
const py=path[i].y*gridSize+gridSize/2;

if(i===0) ctx.moveTo(px,py);
else ctx.lineTo(px,py);

}

ctx.stroke();

progress++;

requestAnimationFrame(animate);

}

animate();
}

/* NAVIGATION */

function navigate(start,destination){
drawPath(start,destination);
}

function highlight(loc,color){
ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(loc.x,loc.y,10,0,Math.PI*2);
ctx.fill();
}

/* FLOOR */

function changeFloor(floor){

currentFloor=floor;
currentImage.src=floorImages[floor];

currentImage.onload=()=>{

detectWallsFromImage();
drawMap();

};

}

/* ZOOM */

function zoomIn(){scale+=0.1;drawMap();}
function zoomOut(){scale-=0.1;drawMap();}

/* DARK MODE */

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

/* MENU */

function loadMenu(){

const menu=document.getElementById("rightMenu");

locations.forEach(loc=>{

const btn=document.createElement("button");
btn.innerText=loc.name;

btn.onclick=()=>{

if(!startLocation){
alert("Click map to set start first");
return;
}

destinationLocation=loc;

changeFloor(loc.floor);

navigate(startLocation,destinationLocation);

};

menu.appendChild(btn);

});

}

/* DRAG (MIDDLE MOUSE ONLY) */

canvas.addEventListener("mousedown",e=>{
if(e.button!==1) return;
isDragging=true;
startX=e.clientX-offsetX;
startY=e.clientY-offsetY;
});

canvas.addEventListener("mousemove",e=>{
if(!isDragging) return;
offsetX=e.clientX-startX;
offsetY=e.clientY-startY;
drawMap();
});

canvas.addEventListener("mouseup",e=>{
if(e.button===1) isDragging=false;
});

/* SAVE / LOAD WALLS */

function saveWalls(){

const saveData=[];

for(let x=0;x<gridWidth;x++){
for(let y=0;y<gridHeight;y++){
if(wallGrid[x][y]){
saveData.push([x,y]);
}
}
}

localStorage.setItem("manualWalls",JSON.stringify(saveData));
}

function loadWalls(){

const data=localStorage.getItem("manualWalls");
if(!data) return;

const walls=JSON.parse(data);

walls.forEach(w=>{
const x=w[0];
const y=w[1];
if(x<gridWidth && y<gridHeight){
wallGrid[x][y]=true;
}
});

}

/* CLICK */

canvas.addEventListener("click",e=>{

const rect=canvas.getBoundingClientRect();

const x=(e.clientX-rect.left-offsetX)/scale;
const y=(e.clientY-rect.top-offsetY)/scale;

const gx=Math.floor(x/gridSize);
const gy=Math.floor(y/gridSize);

if(manualWallMode){

if(gx>=0 && gy>=0 && gx<gridWidth && gy<gridHeight){
wallGrid[gx][gy]=true;
saveWalls();
}

drawMap();
return;

}

startLocation={x:x,y:y,floor:currentFloor};
destinationLocation=null;

drawMap();

});

/* START */

currentImage.onload=()=>{
detectWallsFromImage();
drawMap();
};

loadMenu();

</script>

</body>
</html>
